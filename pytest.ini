[pytest]
testpaths = tests
norecursedirs =
    .git
    .github
    .pytest_cache
    __pycache__
    dist
    build
    tmp
    test
    agno_library
markers =
    integration: network/socket/transport tests that are slower than fast unit tests
    live: tests requiring real external provider credentials/network
    xiaomi: tests requiring the live Xiaomi MiMo provider
addopts = -ra
    --strict-markers
    -p no:cacheprovider
    --basetemp=.pytest_tmp
python_files = test_*.py
